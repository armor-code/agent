# Common configuration for all agents
agentDefaults:
  # ArmorCode server URL - common for all agents
  serverUrl: https://qa.armorcode.ai

  # Request timeout in seconds
  timeout: 30
  
  # Whether to verify SSL certificates
  verify: false
  
  # Thread pool size
  poolSize: 5
  
  # Whether to upload directly to ArmorCode
  uploadToAc: true

  envName: production

# Turn off single deployment mode
singleDeployment:
  enabled: false

# Enable multiple deployments mode
multipleDeployments:
  enabled: true
  
  # List of deployments with unique names and API keys
  instances:
    # First agent - Production environment
    - name: agent-1
      apiKey: 0087e311-a3e5-4d09-a131-360f7f60fdd6
      
    # Second agent - Staging environment  
    - name: agent-2
      apiKey: 79113fb0-24d9-42ed-b482-3a2084b76d26
      
    # Third agent - Development environment
    - name: dev
      apiKey: 364f5d3e-1fb7-4376-adf9-6b81d787820e

# Use local built image
image:
  repository: armorcode/armorcode-web-agent
  tag: latest
  pullPolicy: IfNotPresent

# Persistence configuration for logs and agent data

ebs:
  enabled: true
  storageClass:
    name: "ebs-sc"
    provisioner: "ebs.csi.aws.com"
    parameters:
      type: gp3
      fsType: ext4
      encrypted: "true"
    reclaimPolicy: "Retain"
    allowVolumeExpansion: true
    volumeBindingMode: "Immediate"

  # PVC Configuration
  persistence:
    enabled: true
    storageClassName: "ebs-sc"
    accessMode: ReadWriteOnce
    size: 5Gi

resources:
  requests:
    memory: "1024Mi"
    cpu: "2000m"
  limits:
    memory: "1024Mi"
    cpu: "2000m"

# Network policy configuration
networkPolicy:
  enabled: true
  spec:
    podSelector:
      matchLabels:
        app.kubernetes.io/name: armorcode-web-agent
    policyTypes:
      - Egress
    egress:
      # Allow DNS resolution
      - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
        ports:
          - port: 53
            protocol: UDP
          - port: 53
            protocol: TCP
      
      # Allow HTTPS to all external destinations
      - to:
        - ipBlock:
            cidr: 0.0.0.0/0
        ports:
          - port: 443
            protocol: TCP

serviceAccount:
  create: false

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000